<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download BrawlAI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0f0f12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .icon {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 8px 16px rgba(255, 65, 108, 0.3);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            font-size: 15px;
            color: #a0a0ab;
            margin-bottom: 32px;
            line-height: 1.4;
        }
        .btn {
            display: block;
            background: #007aff; /* Apple Blue */
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 17px;
            padding: 16px;
            border-radius: 14px;
            transition: background 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        .btn:active {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Temporary emoji icon, you can replace with an image later -->
        <div class="icon">🤖</div>
        <h1>BrawlAI Coach</h1>
        <p>Tap below to view the app directly in the App Store and get started.</p>
        
        <!-- PASTE YOUR FULL TRACKING LINK IN THE href="" BELOW -->
        <a href="https://apps.apple.com/app/apple-store/id6777659226?pt=129002146&ct=sy&mt=8" class="btn">
            Get on App Store
        </a>
    </div>

</body>
</html>
